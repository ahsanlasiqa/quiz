<svg viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Table: Data | Frekuensi -->
  <!-- Header row y=30, rows at 30+30*n -->

  <!-- Header background -->
  <rect x="20" y="10" width="180" height="32" fill="#1a7a6e" rx="4"/>
  <text x="80"  y="31" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Data</text>
  <text x="160" y="31" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Frekuensi</text>
  <line x1="120" y1="10" x2="120" y2="175" stroke="#1a7a6e" stroke-width="1.5"/>

  <!-- Rows -->
  <!-- Alternating row backgrounds -->
  <rect x="20" y="42" width="180" height="26" fill="#f8fdfc"/>
  <rect x="20" y="68" width="180" height="26" fill="#e8f5f2"/>
  <rect x="20" y="94" width="180" height="26" fill="#f8fdfc"/>
  <rect x="20" y="120" width="180" height="26" fill="#e8f5f2"/>
  <rect x="20" y="146" width="180" height="26" fill="#f8fdfc"/>

  <!-- Outer border -->
  <rect x="20" y="10" width="180" height="165" fill="none" stroke="#1a7a6e" stroke-width="1.8" rx="4"/>

  <!-- Row lines -->
  <line x1="20" y1="68"  x2="200" y2="68"  stroke="#c8e6e0" stroke-width="1"/>
  <line x1="20" y1="94"  x2="200" y2="94"  stroke="#c8e6e0" stroke-width="1"/>
  <line x1="20" y1="120" x2="200" y2="120" stroke="#c8e6e0" stroke-width="1"/>
  <line x1="20" y1="146" x2="200" y2="146" stroke="#c8e6e0" stroke-width="1"/>

  <!-- Data values -->
  <text x="80"  y="60"  font-size="13" fill="#333" text-anchor="middle">5</text>
  <text x="160" y="60"  font-size="13" fill="#333" text-anchor="middle">4</text>

  <text x="80"  y="86"  font-size="13" fill="#333" text-anchor="middle">6</text>
  <text x="160" y="86"  font-size="13" fill="#333" text-anchor="middle">6</text>

  <!-- Row data=7, freq=10 — highlighted (contains median) -->
  <rect x="20" y="94" width="180" height="26" fill="#fff9c4"/>
  <text x="80"  y="112" font-size="13" fill="#333" font-weight="bold" text-anchor="middle">7</text>
  <text x="160" y="112" font-size="13" fill="#333" font-weight="bold" text-anchor="middle">10</text>
  <line x1="20" y1="94"  x2="200" y2="94"  stroke="#c8e6e0" stroke-width="1"/>
  <line x1="20" y1="120" x2="200" y2="120" stroke="#c8e6e0" stroke-width="1"/>

  <text x="80"  y="138" font-size="13" fill="#333" text-anchor="middle">8</text>
  <text x="160" y="138" font-size="13" fill="#333" text-anchor="middle">15</text>

  <text x="80"  y="164" font-size="13" fill="#333" text-anchor="middle">9</text>
  <text x="160" y="164" font-size="13" fill="#333" text-anchor="middle">5</text>

  <!-- Median indicator -->
  <text x="215" y="115" font-size="11" fill="#e8a020">← Median</text>
</svg>
