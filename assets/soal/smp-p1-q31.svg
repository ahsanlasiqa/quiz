<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Lingkaran besar: pusat P(90,100) radius 70 -->
  <!-- Lingkaran kecil: pusat Q(200,100) radius 25 -->
  <!-- Titik A di tepi kiri lingkaran besar: (20,100) -->
  <!-- Titik B di tepi kanan lingkaran kecil: (225,100) -->
  <!-- Kedua lingkaran bersinggungan dalam -->

  <circle cx="90"  cy="100" r="70"  fill="#e8f4fd" stroke="#1a7a6e" stroke-width="2"/>
  <circle cx="200" cy="100" r="25"  fill="#fef9e7" stroke="#e8a020"  stroke-width="2"/>

  <!-- Garis PA dan QB dan garis AB -->
  <!-- A(20,100) P(90,100) Q(200,100) B(225,100) -->
  <line x1="20"  y1="100" x2="225" y2="100" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Points -->
  <circle cx="20"  cy="100" r="4" fill="#e05c3a"/>
  <circle cx="90"  cy="100" r="4" fill="#1a7a6e"/>
  <circle cx="200" cy="100" r="4" fill="#e8a020"/>
  <circle cx="225" cy="100" r="4" fill="#e05c3a"/>

  <!-- Also draw point B on top of circle (tangent point) from photo -->
  <!-- In the photo B appears to be on the circle boundary at top area -->
  <!-- Let's add chord from A to a point on small circle -->
  <line x1="20" y1="100" x2="190" y2="78" stroke="#1a7a6e" stroke-width="1.8"/>
  <circle cx="190" cy="78" r="4" fill="#333"/>
  <text x="188" y="70" font-size="12" font-weight="bold" fill="#333">B</text>

  <!-- Labels -->
  <text x="8"   y="118" font-size="13" font-weight="bold" fill="#e05c3a">A</text>
  <text x="84"  y="120" font-size="13" font-weight="bold" fill="#1a7a6e">P</text>
  <text x="196" y="120" font-size="13" font-weight="bold" fill="#e8a020">Q</text>

  <!-- Dimension labels -->
  <!-- PA = 8 cm -->
  <text x="48"  y="94"  font-size="11" fill="#1a7a6e">8 cm</text>
  <!-- QB = 2 cm -->
  <text x="200" y="68"  font-size="11" fill="#e8a020">2 cm</text>

  <!-- AB = ? -->
  <text x="85"  y="68"  font-size="12" fill="#e05c3a">AB = ?</text>
</svg>
