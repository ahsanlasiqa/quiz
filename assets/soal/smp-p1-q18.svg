<svg viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- axes -->
  <line x1="40" y1="180" x2="220" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="40" y1="180" x2="40" y2="20"  stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>
  <!-- axis labels -->
  <text x="225" y="184" font-size="13" fill="#333">X</text>
  <text x="36"  y="15"  font-size="13" fill="#333">y</text>
  <text x="28"  y="184" font-size="11" fill="#555">O</text>
  <!-- tick marks & numbers -->
  <!-- x=4 → pixel x=40+4*40=200 -->
  <line x1="200" y1="177" x2="200" y2="183" stroke="#333" stroke-width="1.5"/>
  <text x="197" y="195" font-size="12" fill="#555">4</text>
  <!-- y=3 → pixel y=180-3*40=60 -->
  <line x1="37" y1="60" x2="43" y2="60" stroke="#333" stroke-width="1.5"/>
  <text x="24" y="64" font-size="12" fill="#555">3</text>
  <!-- the line l: from (0,3)→pixel(40,60) to (4,0)→pixel(200,180) extend slightly -->
  <line x1="20" y1="80" x2="220" y2="160" stroke="#1a7a6e" stroke-width="2.2"/>
  <!-- label l -->
  <text x="150" y="95" font-size="13" font-style="italic" fill="#1a7a6e">l</text>
  <!-- dots at intercepts -->
  <circle cx="40"  cy="60"  r="4" fill="#e05c3a"/>
  <circle cx="200" cy="180" r="4" fill="#e05c3a"/>
  <!-- intercept labels -->
  <text x="44"  y="57"  font-size="11" fill="#e05c3a">(0, 3)</text>
  <text x="186" y="175" font-size="11" fill="#e05c3a" text-anchor="end">(4, 0)</text>
</svg>
