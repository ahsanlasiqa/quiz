<svg viewBox="0 0 220 260" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Cone on top, hemisphere at bottom -->
  <!-- Center x=110, base of cone / top of hemisphere y=145 -->
  <!-- Cone: apex(110,20), base ellipse center(110,145) rx=75 -->
  <!-- Hemisphere: center(110,145) rx=75, lower half -->

  <!-- Hemisphere (lower half of circle) -->
  <path d="M 35,145 A 75,75 0 0,0 185,145" fill="#e8f4fd" stroke="#1a7a6e" stroke-width="2"/>
  <!-- Base ellipse (shared boundary) -->
  <ellipse cx="110" cy="145" rx="75" ry="16" fill="#d6eaf8" stroke="#1a7a6e" stroke-width="1.8"/>

  <!-- Cone body -->
  <polygon points="110,20 35,145 185,145" fill="#fef9e7" stroke="#1a7a6e" stroke-width="2"/>

  <!-- Slant height line (garis pelukis) highlighted -->
  <line x1="110" y1="20" x2="185" y2="145" stroke="#e05c3a" stroke-width="2.5"/>

  <!-- Diameter line -->
  <line x1="35" y1="145" x2="185" y2="145" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Dimension annotations -->
  <!-- Slant = 39 cm -->
  <text x="158" y="82" font-size="12" fill="#e05c3a" transform="rotate(55,148,82)">39 cm</text>

  <!-- Diameter = 30 cm -->
  <line x1="35" y1="167" x2="185" y2="167" stroke="#1a7a6e" stroke-width="1"
        marker-end="url(#ab)" marker-start="url(#ab2)"/>
  <text x="110" y="180" font-size="12" fill="#1a7a6e" text-anchor="middle">30 cm</text>

  <defs>
    <marker id="ab"  markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#1a7a6e"/></marker>
    <marker id="ab2" markerWidth="7" markerHeight="7" refX="2" refY="3" orient="auto"><path d="M7,0 L7,6 L0,3 z" fill="#1a7a6e"/></marker>
  </defs>
</svg>
