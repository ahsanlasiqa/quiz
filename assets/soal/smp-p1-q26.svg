<svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>
  <!-- Intersection point: (140, 110) -->
  <!-- Line 1: from bottom-left to upper-right (arrow right) -->
  <line x1="40"  y1="160" x2="260" y2="60"
        stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Line 2: from upper-left to bottom-right (arrow right) -->
  <line x1="30"  y1="50"  x2="250" y2="170"
        stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Angle arcs at intersection (~140,110) -->
  <!-- 120° arc — upper region between the two lines -->
  <path d="M 165,95 A 28,28 0 1,1 115,95" fill="none" stroke="#e8a020" stroke-width="2"/>
  <!-- 2y° arc — lower region -->
  <path d="M 115,125 A 22,22 0 0,1 165,125" fill="none" stroke="#1a7a6e" stroke-width="2"/>

  <!-- Labels -->
  <text x="128" y="72"  font-size="14" fill="#e8a020" font-weight="bold">120°</text>
  <text x="122" y="148" font-size="14" fill="#1a7a6e" font-weight="bold">2y°</text>
</svg>
