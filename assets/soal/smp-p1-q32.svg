<svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Cone: apex A(110,20), base center O(110,160), base radius ~75 -->
  <!-- B = left base edge (35,160), C = right base edge (185,160) -->

  <!-- Base ellipse -->
  <ellipse cx="110" cy="160" rx="75" ry="18" fill="#e8f4fd" stroke="#1a7a6e" stroke-width="1.8"/>
  <!-- Dashed back half -->
  <path d="M 35,160 A 75,18 0 0,1 185,160" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Cone surface lines -->
  <line x1="110" y1="20"  x2="35"  y2="160" stroke="#1a7a6e" stroke-width="2"/>
  <line x1="110" y1="20"  x2="185" y2="160" stroke="#1a7a6e" stroke-width="2"/>

  <!-- Garis tinggi (dashed) from apex to center O -->
  <line x1="110" y1="20" x2="110" y2="160" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Garis pelukis AB highlighted -->
  <line x1="110" y1="20" x2="35" y2="160" stroke="#e05c3a" stroke-width="2.5"/>

  <!-- Points -->
  <circle cx="110" cy="20"  r="4" fill="#333"/>
  <circle cx="35"  cy="160" r="4" fill="#e05c3a"/>
  <circle cx="185" cy="160" r="4" fill="#333"/>
  <circle cx="110" cy="160" r="3" fill="#888"/>

  <!-- Labels -->
  <text x="107" y="14"  font-size="14" font-weight="bold" fill="#333">A</text>
  <text x="18"  y="172" font-size="14" font-weight="bold" fill="#e05c3a">B</text>
  <text x="187" y="172" font-size="14" font-weight="bold" fill="#333">C</text>
  <text x="112" y="175" font-size="12" fill="#888">O</text>

  <!-- AB label -->
  <text x="52"  y="82"  font-size="12" fill="#e05c3a" font-weight="bold">AB = ?</text>
</svg>
